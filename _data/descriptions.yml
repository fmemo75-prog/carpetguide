# =============================================================
- file: "hali-11b.jpg"
  text: "<b>Curator Analysis:</b> A close-up of a Central Anatolian Kilim showcasing the <b>Elibelinde</b> and <b>Pıtrak</b> motifs. These ancient symbols represent fertility and protection against the evil eye."

- file: "hali-20220713_115826b.jpg"
  text: "<b>Curator Analysis:</b> Authentic <b>Tülü rug</b> from Karapınar. 'Tülü' means hairy, referring to the long wool pile used by nomads for warmth and insulation during harsh winters."

- file: "hali-20220713_132921b.jpg"
  text: "<b>Curator Analysis:</b> Stunning <b>Sumak (Soumak)</b> technique featuring the <b>Su Yolu</b> (Water Way) pattern. Note the embossed texture created by wrapping threads around the warp."

- file: "hali-b506047632_10162745708087094_8074213994208374708_n.jpg"
  text: "<b>Curator Fieldwork:</b> Investigating rare nomadic weaving structures. Every knot tells a story of the Anatolian plateau."

- file: "hali-IMG_20170628_190520b.jpg"
  text: "<b>Curator Selection:</b> Detailed look at hand-spun wool and the vibrant results of traditional <b>kök boya</b> (natural dyes)."

