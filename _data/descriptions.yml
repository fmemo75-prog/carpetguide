10.jpg: "A breathtaking hand-woven recreation of Leonardo da Vinci’s masterpiece, <b>Salvator Mundi</b>. This extraordinary piece is <b>Pure Silk on Silk</b>, demonstrating the surgical precision and high knot density of Anatolian craftsmanship. You can admire this handmade treasure at the <b>Anatolian Art Museum in Göreme</b>, where art history meets the loom. <br><a href='./en/handknotted' style='color: #8b0000; font-weight: bold; text-decoration: underline;'>Learn more about Silk on Silk techniques</a>"
