# 2. BÖLÜM: KÜRATÖR ANALİZLERİ (FATİH MEHMET CANITEZ)
# ==========================================
- file: "hali-20220713_115740b.jpg"
  tag: "Curator Selection"
  type: "b"
  map: "https://www.google.com/maps/search/?api=1&query=Karapinar+Konya"
  text: "<b>Filikli Tülü:</b> A masterpiece of nomadic art featuring long, lustrous locks of <b>Angora goat mohair</b>. This piece showcases a vibrant <b>kök boya</b> palette. Traditionally used as luxury bedding, its silk-like texture represents the pinnacle of Anatolian tribal weaving."

- file: "hali-20220713_132921.jpg"
  tag: "Curator Analysis"
  type: "b"
  map: "https://www.google.com/maps/search/?api=1&query=Goreme+Cappadocia"
  text: "<b>Sumak Technique:</b> High-relief pattern study using the wrapping method. Featuring the symbolic <b>Su Yolu</b> (Water Way) pattern. Technical research by Fatih Mehmet Canıtez."

- file: "hali-11.jpg"
  tag: "Curator Analysis"
  type: "b"
  map: "https://www.google.com/maps/search/?api=1&query=Goreme+Cappadocia"
  text: "Technical study of <b>Elibelinde</b> and <b>Pıtrak</b> motifs. Ancient symbols representing fertility and protection. Private collection analysis."

- file: "hali-b506047632_10162745708087094_8074213994208374708_n.jpg"
  tag: "Curator Fieldwork"
  type: "b"
  map: "https://www.google.com/maps/search/?api=1&query=Goreme+Cappadocia"
  text: "Investigating rare nomadic weaving structures. Every knot tells a story of the Anatolian plateau and tribal migration."

- file: "hali-IMG_20170628_190520b.jpg"
  tag: "Curator Selection"
  type: "b"
  map: "https://www.google.com/maps/search/?api=1&query=Goreme+Cappadocia"
  text: "Vivid example of traditional <b>kök boya</b> (natural dyes). Field study on the aging process of hand-spun Anatolian wool."

