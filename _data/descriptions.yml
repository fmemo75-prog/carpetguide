hali-10.jpg: 'Hand-woven recreation of Leonardo da Vinci’s Salvator Mundi. Pure Silk on Silk, displayed at the Anatolian Art Museum in Goreme. <br><a href="./en/handknotted" style="color: #8b0000; font-weight: bold;">Learn about Silk on Silk</a>'

hali-20220713_115826.jpg: "An authentic <b>Tülü rug</b>, a nomadic masterpiece from the Karapınar region of Central Anatolia. The term 'Tülü' refers to its distinctive long and lustrous wool pile, which provides a fur-like texture. Traditionally crafted by Yoruk nomads for warmth and insulation during harsh winters, these rugs serve as both artistic floor coverings and cozy bedding. This specific piece showcases vibrant <b>natural dyes (kök boya)</b>, demonstrating the timeless brilliance of traditional Anatolian pigments."
<ul>
hali-11.jpg: "A close-up of a Central Anatolian Kilim showcasing the <b>Elibelinde</b> (Hands-on-Hips) and <b>Pıtrak</b> (Burdock) motifs. These ancient symbols represent fertility and protection against the evil eye. The vibrant <b>kök boya</b> colors (natural dyes) and hand-spun wool reflect the authentic nomadic heritage of the region. <br><a href='./en/kilim' style='color: #8b0000; font-weight: bold;'>Read the Full Kilim Guide</a>"
</td>

hali-sumak-zigzag.jpg: "A stunning example of the <b>Sumak (Soumak)</b> technique, featuring a dynamic <b>Su Yolu</b> (Water Way) or Chevron pattern. Unlike standard kilims, the Sumak technique involves wrapping decorative threads around the warp, creating a rich, embossed texture. The vibrant turquoise and madder red are achieved through traditional <b>kök boya</b> (natural dyes). This pattern symbolizes life’s continuity and protection. <br><a href='./en/sumak' style='color: #8b0000; font-weight: bold;'>Learn the Sumak Weaving Technique</a>"