hali-20220713_115826.jpg: "An authentic <b>Tülü rug</b>, a nomadic masterpiece from the Karapınar region of Central Anatolia. The term 'Tülü' refers to its distinctive long and lustrous wool pile, which provides a fur-like texture. Traditionally crafted by Yoruk nomads for warmth and insulation during harsh winters, these rugs serve as both artistic floor coverings and cozy bedding. This specific piece showcases vibrant <b>natural dyes (kök boya)</b>, demonstrating the timeless brilliance of traditional Anatolian pigments."
<ul>
    <li><strong>Elibelinde (Hands-on-Hips):</strong> The stylized white and dark-red motifs on the borders represent the mother goddess, fertility, and the continuation of the family line. It is the most sacred feminine symbol in Turkish weaving.</li>
    <li><strong>Pıtrak (Burdock):</strong> The serrated edges of the central orange diamond represent the burdock plant. In Anatolian culture, this motif is believed to ward off the "Evil Eye" (Nazar) and protect the abundance of the household.</li>
    <li><strong>Göz (The Eye):</strong> The small hourglass/diamond shape in the very center functions as a protective "Eye," ensuring the weaver's family is safe from jealousy and harm.</li>
  </ul>
  
  <p><strong>Color Palette:</strong> The use of <b>Madder Red (Kök Al)</b>, <b>Indigo Green</b>, and <b>Natural Cream</b> wool points to a traditional production where plants and minerals were used for dyeing.</p>
