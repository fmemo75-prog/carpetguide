# 2. KÜRATÖR ANALİZLERİ (Senin açıklamaların ve içinde 'b' olanlar)
- file: "hali-20220713_132921.jpg"
  tag: "Curator Analysis"
  type: "b"
  text: "<b>Sumak (Soumak) technique</b> featuring the <b>Su Yolu</b> (Water Way) pattern. Note the embossed texture created by wrapping decorative threads around the warp. Technical research by Fatih Mehmet Canıtez."

- file: "hali-11.jpg"
  tag: "Curator Analysis"
  type: "b"
  text: "A technical study of the <b>Elibelinde</b> (Hands-on-Hips) and <b>Pıtrak</b> (Burdock) motifs. These ancient symbols represent fertility and protection. Private collection analysis."

- file: "hali-b506047632_10162745708087094_8074213994208374708_n.jpg"
  tag: "Curator Fieldwork"
  type: "b"
  text: "Investigating rare nomadic weaving structures. Every knot tells a story of the Anatolian plateau and tribal migration."

- file: "hali-IMG_20170628_190520b.jpg"
  tag: "Curator Selection"
  type: "b"
  text: "Vivid example of traditional <b>kök boya</b> (natural dyes). Field study on the transition of organic colors over decades."

