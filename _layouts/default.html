<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }} | Carpet Guide</title>
    <style>
        :root { --primary-red: #8b0000; --carpet-gold: #d4af37; --deep-navy: #1a2a6c; --cream-bg: #fdf5e6; }
        body { background-color: var(--cream-bg); font-family: 'Georgia', serif; line-height: 1.8; color: #2c3e50; margin: 0; }
        .container { max-width: 1000px; margin: 30px auto; background-color: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid var(--primary-red); }
        .translate-bar { background: linear-gradient(to right, var(--deep-navy), #2a4858); padding: 12px 25px; display: flex; justify-content: flex-end; align-items: center; }
        .translate-label { font-size: 14px; margin-right: 15px; font-weight: bold; color: white; }
        .goog-te-gadget-simple { border: 1px solid #ccc !important; border-radius: 4px !important; padding: 4px !important; }
        .back-home-container { margin-top: 50px; text-align: center; border-top: 1px solid #eee; padding-top: 20px; }
        .back-home-btn { display: inline-block; padding: 12px 30px; background: var(--primary-red); color: white !important; text-decoration: none; border-radius: 50px; font-weight: bold; }
        img { max-width: 100%; height: auto; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="translate-bar">
      <span class="translate-label">🌍 Select Language:</span>
      <div id="google_translate_element"></div>
    </div>

    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({pageLanguage: 'en', includedLanguages: 'tr,en,fr,de,it,es,ja', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit&hl=en"></script>

    <div class="container">
      {{ content }} <!-- Sayfa içeriği buraya bir kez basılır -->

      <!-- Sadece ana sayfa olmayanlarda butonu göster -->
      {% if page.url != "/" and page.url != "/index.html" %}
      <div class="back-home-container">
        <a href="{{ site.baseurl }}/" class="back-home-btn">🏠 Back to Dashboard</a>
      </div>
      {% endif %}
    </div>
</body>
</html>
