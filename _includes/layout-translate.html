<div id="google_translate_element"></div>

<script type="text/javascript">
function googleTranslateElementInit() {
  new google.translate.TranslateElement({
    pageLanguage: 'en',
    includedLanguages: 'fr,de,es,it,pt,nl,pl,ru,tr,ja,ko,zh-CN,ar,hi,vi,id,el,cs,hu,ro,uk,sv,da,fi,no,he,th,bn,fa,bg',
    layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
    autoDisplay: false
  }, 'google_translate_element');

  // Yazıyı oraya zorla yazdıran fonksiyon
  function forceLanguageText() {
    var container = document.querySelector('.goog-te-gadget-simple');
    if (container) {
      // Google'ın varsayılan içeriğini temizle ve kendi istediğimizi yaz
      var span = container.querySelector('span');
      if (span) {
        span.innerHTML = '🌐 Language';
        span.style.display = 'inline-block';
        span.style.visibility = 'visible';
      }
    } else {
      // Yüklenene kadar her 100ms'de bir dene
      setTimeout(forceLanguageText, 100);
    }
  }
  forceLanguageText();
}
</script>
<script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<style>
  /* Widget'ın genel kutusu */
  .goog-te-gadget-simple {
    background: rgba(255,255,255,0.1) !important;
    border: 1px solid #d4af37 !important;
    border-radius: 20px !important;
    padding: 5px 15px !important; /* Genişliği artırdık */
    cursor: pointer !important;
    display: flex !important;
    align-items: center !important;
    text-decoration: none !important;
  }

  /* İçindeki yazının stili */
  .goog-te-gadget-simple span {
    color: white !important;
    font-size: 12px !important;
    font-family: 'Georgia', serif !important;
    display: inline-block !important;
    opacity: 1 !important;
  }

  /* Google'ın kendi ok işaretini ve ikonunu gizle (kalabalık yapmasın) */
  .goog-te-gadget-simple img, 
  .goog-te-menu-value img, 
  .goog-te-menu-value span:nth-child(3),
  .goog-te-gadget-icon {
    display: none !important;
  }

  /* Üstteki Google barını gizle */
  .goog-te-banner-frame.skiptranslate { display: none !important; }
  body { top: 0 !important; }
</style>
