<!-- 1. Kutu -->
<div id="google_translate_element" style="display: inline-block; vertical-align: middle;"></div>

<!-- 2. Ayarlar -->
<script type="text/javascript">
function googleTranslateElementInit() {
  new google.translate.TranslateElement({
    pageLanguage: 'en',
    includedLanguages: 'fr,de,es,it,pt,nl,pl,ru,tr,ja,ko,zh-CN,ar,hi,vi,id,el,cs,hu,ro,uk,sv,da,fi,no,he,th,bn,fa,bg',
    layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
    autoDisplay: false
  }, 'google_translate_element');

  // Yazıyı Language olarak sabitleyen güvenli fonksiyon
  var checkExist = setInterval(function() {
    var translateSpan = document.querySelector('.goog-te-gadget-simple span');
    if (translateSpan) {
      translateSpan.innerHTML = (window.innerWidth < 768) ? '🌐' : '🌐 Language';
      clearInterval(checkExist);
    }
  }, 100);
}
</script>

<!-- 3. Google Dış Kaynak (Bu satır en altta olmalı) -->
<script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<style>
  /* Google'ın kendi ikonlarını ve yazılarını gizle */
  .goog-te-gadget img, .goog-te-gadget span { display: none !important; }
  .goog-te-gadget-simple { 
    background: rgba(255,255,255,0.1) !important; 
    border: 1px solid #d4af37 !important; 
    border-radius: 20px !important; 
    padding: 4px 10px !important;
    display: flex !important;
    align-items: center;
  }
  /* Bizim eklediğimiz Language yazısı görünsün */
  .goog-te-gadget-simple span:first-child { 
    display: inline-block !important; 
    color: white !important; 
    font-size: 13px !important; 
  }
  .goog-te-banner-frame.skiptranslate { display: none !important; }
  body { top: 0 !important; }
</style>
