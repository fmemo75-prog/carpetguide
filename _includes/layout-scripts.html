<script>
    // 1. Hamburger Menü Fonksiyonu
    function toggleNavDrawer() {
        const drawer = document.getElementById('nav-drawer');
        const overlay = document.getElementById('nav-overlay');
        if (drawer && drawer.style.right === '0px') {
            drawer.style.right = '-320px';
            if(overlay) overlay.style.display = 'none';
            document.body.style.overflow = 'auto';
        } else if(drawer) {
            drawer.style.right = '0px';
            if(overlay) overlay.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }
    }

    // 2. Resim Kapatma Fonksiyonu (Dışarıda olmalı ki HTML görebilsin)
    function closeLightbox() {
        const overlay = document.getElementById('img-lightbox-overlay');
        if (overlay) {
            overlay.style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    }

    // 3. Resim Büyütme Ayarları
    document.addEventListener("DOMContentLoaded", function() {
        const images = document.querySelectorAll('img');
        const overlay = document.getElementById('img-lightbox-overlay');
        const enlargedImg = document.getElementById('enlarged-img');

        images.forEach(img => {
            // Harita resimlerini ayıkla (Leaflet haritası içindeyse büyümesin)
            const isMap = img.closest('.leaflet-container') || 
                          img.closest('#map') || 
                          img.classList.contains('leaflet-marker-icon');

            if (!isMap) {
                img.style.cursor = 'zoom-in';
                
                // Tıklama olayını ekle
                img.onclick = function() {
                    if (overlay && enlargedImg) {
                        enlargedImg.src = this.src;
                        overlay.style.display = 'flex';
                        document.body.style.overflow = 'hidden';
                    }
                };
            }
        });

        // ESC tuşu ile kapatma
        document.addEventListener('keydown', function(e) {
            if (e.key === "Escape") closeLightbox();
        });
    });
</script>
