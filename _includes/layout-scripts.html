<script>
    // 1. Hamburger Menü Fonksiyonu
    function toggleNavDrawer() {
        const drawer = document.getElementById('nav-drawer');
        const overlay = document.getElementById('nav-overlay');
        if (drawer && drawer.style.right === '0px') {
            drawer.style.right = '-320px';
            if(overlay) overlay.style.display = 'none';
            document.body.style.overflow = 'auto';
        } else if(drawer) {
            drawer.style.right = '0px';
            if(overlay) overlay.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }
    }

    // 2. Lightbox Kapatma Fonksiyonu (Global kapsamda tanımlıyoruz)
    function closeLightbox() {
        const overlay = document.getElementById('img-lightbox-overlay');
        if (overlay) {
            overlay.style.display = 'none';
            document.body.style.overflow = 'auto'; // Kaydırmayı geri aç
        }
    }

    // 3. Resim Büyütme ve Olay Dinleyicileri
    document.addEventListener("DOMContentLoaded", function() {
        const allImages = document.querySelectorAll('img');
        const overlay = document.getElementById('img-lightbox-overlay');
        const fullImg = document.getElementById('enlarged-img');
        
        allImages.forEach(img => {
            // Harita kontrolü
            const isMap = img.closest('.leaflet-container') || 
                          img.closest('#map') || 
                          img.classList.contains('leaflet-marker-icon') ||
                          img.classList.contains('leaflet-tile');

            if (!isMap) {
                img.style.cursor = 'zoom-in';
                img.addEventListener('click', function() {
                    if (overlay && fullImg) {
                        fullImg.src = this.src;
                        overlay.style.display = 'flex';
                        document.body.style.overflow = 'hidden';
                    }
                });
            }
        });

        // ESC tuşuna basınca kapatma desteği
        document.addEventListener('keydown', function(e) {
            if (e.key === "Escape") closeLightbox();
        });
    });
</script>
