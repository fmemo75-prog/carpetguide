<style>

a { text-decoration: none; }
img { max-width: 100%; height: auto; display: block; }

/* ── HERO ── */
.hero { width: 100%; background: #6b2c2c; border-radius: 0 0 24px 24px; padding: 44px 20px 40px; position: relative; }
.hero-inner { max-width: 860px; margin: 0 auto; display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }

.hero-text h1 span { color: #d4af37; display: block; font-size: 17px; }
.hero-text p { color: rgba(255,255,255,0.72); font-size: 14px; line-height: 1.6; margin-bottom: 20px; }
.hero-btns { display: flex; gap: 10px; }
.btn-gold { background: #d4af37; color: #1a0a0a !important; padding: 12px 22px; border-radius: 50px; font-weight: bold; font-size: 14px; }
.btn-outline { border: 1.5px solid rgba(255,255,255,0.5); color: white !important; padding: 11px 22px; border-radius: 50px; font-weight: bold; font-size: 14px; }

.loom-layout-container {
    max-width: 1000px;
    margin: 10px auto 40px; /* Hero'ya yaklaştırdık */
    padding: 0 16px;
    display: flex;
    align-items: flex-start; /* Kartları yukarı hizalar */
    justify-content: center;
    gap: 20px;
}
.loom-side-column { flex: 1; display: flex; flex-direction: column; gap: 15px; margin-top: 5px; }
.loom-center-column { flex: 1.4; text-align: center; }
.loom-img-fixed { width: 100%; max-width: 400px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
.mini-card { padding: 12px 15px !important; min-height: 95px; margin: 0 !important; background: #fff; border-radius: 12px; border: 1px solid #eee; }

/* ── KÜÇÜLTÜLMÜŞ KUTU (MINI VERSION) ── */
.comparison-promo-box.mini-version {
    max-width: 750px;
    margin: 30px auto;
    padding: 25px;
    background: #fff;
    border: 1px solid #eee;
    text-align: center;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);

.comparison-promo-box.mini-version h3 { font-size: 1.3rem; margin-bottom: 8px; color: #333; }

.btn-comparison { background: #8b0000; color: white !important; padding: 10px 25px; border-radius: 50px; font-weight: bold; font-size: 12px; display: inline-block; }

.sec-label { text-align: center; padding: 30px 16px 15px; }
.sec-label-bar { width: 50px; height: 3px; background: #8b0000; margin: 0 auto 10px; }
.card-grid { max-width: 960px; margin: 0 auto; padding: 0 16px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }

/* 📱 MOBİL AYARI */
@media (max-width: 850px) {
    .loom-layout-container { flex-direction: column; align-items: center; }

.left-motif { left: 0; } .right-motif { right: 0; }
